{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card p-4">
      <h1 class="h3 mb-3 text-center">Cryptocurrency and Stock Price Predictor</h1>
      <form method="post" action="/" class="mt-3">
        <div class="mb-3">
          <label for="stock" class="form-label">Enter Stock or Crypto Ticker</label>
          <input type="text" class="form-control" id="stock" name="stock" placeholder="e.g., AAPL or BTC-USD" value="BTC-USD" required>
          <div class="form-text">Use Yahoo Finance tickers (For either Cryptocurrencies or Stocks).</div>
        </div>

        <div class="mb-3">
          <label for="no_of_days" class="form-label">Number of Days to Predict</label>
          <input type="number" class="form-control" id="no_of_days" name="no_of_days" min="1" max="100" value="10" required>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Predict</button>
        </div>
      </form>
      <small class="text-muted d-block mt-3">Tip: start with 10 days to validate predictions, then increase.</small>
    </div>
  </div>
</div>
{% endblock %}
